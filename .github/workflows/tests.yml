name: tests

on:
  push:
  pull_request:

jobs:
  model-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.6,<3" "torchvision>=0.21,<1"
      - name: Compile code
        run: python -m compileall -q dl_models examples experiments tests
      - name: Run model tests
        run: python -m unittest discover -s tests -v
